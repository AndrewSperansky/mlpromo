# app/ml/feature_config.yaml

# Фичи, которые приходят в запросе (инференс) — 11 полей
inference_features:
  # Идентификаторы
  - name: promo_id
    type: string
    required: true
    default: ""
  - name: sku
    type: string
    required: true
    default: ""
  - name: store_id
    type: string
    required: true
    default: ""

  # Временные параметры
  - name: promo_week1
    type: int
    required: true
    default: 0
  - name: promo_week2
    type: int
    required: true
    default: 0

  # Ценовые параметры
  - name: regular_price
    type: float
    required: true
    default: 0.0
  - name: promo_price
    type: float
    required: true
    default: 0.0

  # Контекстные параметры
  - name: prev_promo_id
    type: string
    required: false
    default: ""
  - name: adv_carrier
    type: string
    required: false
    default: ""
  - name: adv_material
    type: string
    required: false
    default: ""
  - name: promo_mechanics
    type: string
    required: false
    default: ""


# Фичи, которые вычисляются из запроса
computed_features:
  - name: percent_price_drop
    type: float
    formula: |
      ((regular_price - promo_price) / regular_price) * 100 if regular_price > 0 else 0


# Фичи, которые подтягиваются из БД (из industrial_dataset_raw)
lookup_features:
  # Категориальные поля
  - name: store_location_type
    type: string
    source: industrial_dataset
    key: store_id
    field: store_location_type
    cache_ttl: 3600

  - name: region
    type: string
    source: industrial_dataset
    key: store_id
    field: region
    cache_ttl: 3600

  - name: format_assortment
    type: string
    source: industrial_dataset
    key: store_id
    field: format_assortment
    cache_ttl: 3600

  - name: sku_level_2
    type: string
    source: industrial_dataset
    key: sku
    field: sku_level_2
    cache_ttl: 3600

  - name: sku_level_3
    type: string
    source: industrial_dataset
    key: sku
    field: sku_level_3
    cache_ttl: 3600

  - name: sku_level_4
    type: string
    source: industrial_dataset
    key: sku
    field: sku_level_4
    cache_ttl: 3600

  - name: sku_level_5
    type: string
    source: industrial_dataset
    key: sku
    field: sku_level_5
    cache_ttl: 3600

  - name: category
    type: string
    source: industrial_dataset
    key: sku
    field: category
    cache_ttl: 3600

  - name: is_new_sku
    type: int
    source: industrial_dataset
    key: sku
    field: is_new_sku
    cache_ttl: 3600

  - name: analog_sku
    type: string
    source: industrial_dataset
    key: sku
    field: analog_sku
    cache_ttl: 3600


# Исторические продажи (52 недели)
